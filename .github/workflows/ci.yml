name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
      options: --security-opt seccomp=unconfined
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --workspace

      - name: Check binary
        run: |
          ls -lh target/release/truthdb
          file target/release/truthdb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: truthdb
          path: target/release/truthdb
          if-no-files-found: error

  conformance:
    name: TDS Conformance
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
      # io_uring at runtime needs the seccomp profile relaxed, same as tests.
      options: --security-opt seccomp=unconfined
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-conformance-${{ hashFiles('**/Cargo.lock') }}

      - name: Build server
        run: cargo build --release -p truthdb

      - name: Install Python TDS driver (pytds)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pip
          # pyOpenSSL is required for pytds's TLS (encrypted) connections.
          pip install --break-system-packages python-tds==1.17.1 pyOpenSSL

      - name: Install Go
        run: |
          curl -fsSL https://go.dev/dl/go1.22.4.linux-amd64.tar.gz | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Generate a self-signed TLS certificate
        run: |
          mkdir -p /etc/truthdb
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout /etc/truthdb/tls.key -out /etc/truthdb/tls.crt \
            -subj "/CN=localhost"

      - name: Configure and start server
        run: |
          mkdir -p /etc/truthdb /var/lib/truthdb
          cat > /etc/truthdb/truthdb.toml <<'EOF'
          [storage]
          size_gib = 1

          [tds]
          enabled = true
          addr = "127.0.0.1"
          port = 1433
          database = "truthdb"
          tls_cert = "/etc/truthdb/tls.crt"
          tls_key = "/etc/truthdb/tls.key"

          [tds.auth]
          sa = "secret"
          EOF
          STATE_DIRECTORY=/var/lib/truthdb ./target/release/truthdb &
          echo $! > /tmp/truthdb.pid

      - name: Wait for the TDS port
        run: |
          python3 - <<'EOF'
          import socket, sys, time
          for _ in range(60):
              try:
                  socket.create_connection(("127.0.0.1", 1433), timeout=1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(0.5)
          print("TDS port 1433 never opened", file=sys.stderr)
          sys.exit(1)
          EOF

      - name: Conformance — pytds (Python)
        run: python3 scripts/tds_conformance.py 127.0.0.1 1433 sa secret

      - name: Conformance — pytds parameterized (sp_executesql RPC)
        run: python3 scripts/tds_conformance_rpc.py 127.0.0.1 1433 sa secret

      - name: Conformance — pytds prepared statements (sp_prepare family)
        run: python3 scripts/tds_conformance_prepared.py 127.0.0.1 1433 sa secret

      - name: Conformance — pytds over TLS (tunneled handshake)
        run: python3 scripts/tds_conformance_tls.py 127.0.0.1 1433 sa secret /etc/truthdb/tls.crt

      - name: Conformance — go-mssqldb (Go)
        run: |
          repo="$PWD"
          work="$(mktemp -d)"
          cp "$repo/scripts/tds_conformance.go" "$work/main.go"
          cd "$work"
          go mod init conf
          go get github.com/microsoft/go-mssqldb@v1.8.0
          go run . 127.0.0.1 1433 sa secret

      - name: Conformance — mssql-jdbc (Java, prepared-statement flow)
        run: |
          apt-get install -y --no-install-recommends openjdk-17-jdk-headless
          curl -sfLo /tmp/mssql-jdbc.jar https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar
          java -cp /tmp/mssql-jdbc.jar scripts/TdsConformance.java 127.0.0.1 1433 sa secret

      - name: Conformance — ODBC sqlcmd (mssql-tools18, scripted with output diff)
        run: |
          curl -s https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /usr/share/keyrings/ms.gpg
          echo 'deb [signed-by=/usr/share/keyrings/ms.gpg] https://packages.microsoft.com/debian/12/prod bookworm main' > /etc/apt/sources.list.d/mssql.list
          apt-get update
          ACCEPT_EULA=Y apt-get install -y --no-install-recommends msodbcsql18 mssql-tools18
          /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P secret -d truthdb -N o -I \
            -v TABLE=conf_odbc -i scripts/tds_conformance_sqlcmd.sql > /tmp/odbc.out 2>&1
          diff -u scripts/tds_conformance_sqlcmd.expected /tmp/odbc.out
          echo "tds conformance (ODBC sqlcmd): OK"

      - name: Conformance — go-sqlcmd (scripted with output diff)
        run: |
          curl -sfL https://github.com/microsoft/go-sqlcmd/releases/download/v1.8.2/sqlcmd-linux-amd64.tar.bz2 | tar xj -C /usr/local/bin sqlcmd
          sqlcmd -S 127.0.0.1,1433 -U sa -P secret -d truthdb -N disable -I \
            -v TABLE=conf_go -i scripts/tds_conformance_sqlcmd.sql > /tmp/gosqlcmd.out 2>&1
          diff -u scripts/tds_conformance_gosqlcmd.expected /tmp/gosqlcmd.out
          echo "tds conformance (go-sqlcmd): OK"

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/truthdb.pid ]; then kill "$(cat /tmp/truthdb.pid)" || true; fi
