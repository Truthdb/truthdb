# Embedded default config for truthdb
[network]
addr = "0.0.0.0"
port = 9623

[storage]
path = "truth.db"
size_gib = 10
wal_ratio = 0.05
metadata_ratio = 0.08
snapshot_ratio = 0.02
allocator_ratio = 0.02
reserved_ratio = 0.17
group_sync_batches = 32
group_sync_ms = 5
backpressure_timeout_ms = 50
snapshot_min_interval_ms = 1000
snapshot_wal_threshold = 0.7
# The database's default collation: what a character column declared without an
# explicit COLLATE gets. Applied when the database file is created and stamped
# into it — an existing file keeps the collation it was created with, since its
# index keys are already encoded under it. Default: SQL_Latin1_General_CP1_CI_AS.
# default_collation = "Finnish_Swedish_CI_AS"

# TDS (SQL Server protocol) gateway. Disabled by default. When enabled, real
# SQL Server drivers (pytds, go-mssqldb with encrypt=disable) can connect.
# [tds]
# enabled = true
# addr = "0.0.0.0"
# port = 1433
# database = "truthdb"
#
#
# encryption: "off" never encrypts; "optional" (default) encrypts when the
# client asks; "required" refuses clients that will not encrypt, and needs
# tls_cert/tls_key.
# encryption = "optional"
# tls_cert = "/etc/truthdb/tls.crt"
# tls_key = "/etc/truthdb/tls.key"
#
# [tds.auth]  — FIRST-BOOT SEED ONLY. These username = password entries are
# hashed into catalog logins the first time the server starts; the catalog is
# then authoritative and is never consulted from this file for authentication.
# Once the built-in sa login exists this section is inert (editing it does not
# add, remove, or rotate a login — use CREATE/ALTER/DROP LOGIN). If no sa is set
# here, an sa login is still created but DISABLED. Send passwords over TLS: see
# encryption above.
# sa = "change-me"

# Physical replication. Disabled by default. Every member of a cluster shares
# the same cluster_uuid and shared_secret. A primary listens on port (TLS
# mandatory: tls_cert/tls_key) and streams WAL to standbys; a standby dials
# primary_addr, verifies the primary against tls_ca, and applies the stream.
# Seed a standby's database file with:  truthdb-cli restore --standby
# [replication]
# enabled = true
# role = "primary"            # or "standby"
# node_id = 1                 # unique per member (a standby's slot id)
# cluster_uuid = "8f0e7a34-2d51-4c11-9c9e-3f6d2a7b1c05"
# shared_secret = "change-me"
#
# Primary:
# addr = "0.0.0.0"
# port = 9624
# tls_cert = "/etc/truthdb/repl.crt"
# tls_key = "/etc/truthdb/repl.key"
# heartbeat_ms = 1000
# max_slot_retain_bytes = 0   # 0 = unlimited: a lagging standby is never dropped
#
# Standby:
# primary_addr = "primary.example:9624"
# tls_ca = "/etc/truthdb/repl.crt"   # the primary's cert (or its CA)
# server_name = "primary.example"    # defaults to the host part of primary_addr
# reconnect_delay_ms = 1000
